<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Early Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SMOKE TEST — instrument-readout landing system
     Tokens: ink chassis / lit readout screens / semantic status
     Display: Space Grotesk · Body: IBM Plex Sans · Data: IBM Plex Mono
     ============================================================ */
  :root{
    --ink:#0F1719;          /* deep teal-slate chassis */
    --ink-2:#162226;        /* raised chassis panel */
    --line:#24343a;         /* hairline on dark */
    --screen:#EEF2F0;       /* lit readout screen (cool paper, not cream) */
    --screen-line:#d2dbd7;
    --fg:#E2E9E6;           /* primary text on dark */
    --fg-dim:#8497a0;       /* secondary text on dark */
    --ink-fg:#16242a;       /* text on screen */
    --ink-fg-dim:#5b6f73;
    --ok:#37B98A;           /* status: healthy */
    --warn:#E2A53D;         /* status: warning */
    --fail:#E2615C;         /* status: failed */
    --go:#37B98A;           /* primary action = "go / I want this" */
    --go-press:#2da178;
    --radius:14px;
    --maxw:1120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--ink);
    color:var(--fg);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    font-size:17px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ---- top bar ---- */
  .topbar{border-bottom:1px solid var(--line)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .mark{display:flex;align-items:center;gap:10px;font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:-.01em;font-size:1.12rem}
  .mark .pulse{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(55,185,138,.55);animation:beat 2.4s infinite}
  .topbar .meta{font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:var(--fg-dim);letter-spacing:.04em;text-transform:uppercase}

  /* ---- hero ---- */
  .hero{padding:clamp(48px,8vw,104px) 0 clamp(40px,6vw,72px)}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(32px,5vw,64px);align-items:center}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.76rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--go);margin-bottom:22px;display:flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--go);display:inline-block}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(2.1rem,4.4vw,3.4rem);line-height:1.04;letter-spacing:-.025em;color:#fff;margin-bottom:20px;text-wrap:balance}
  .sub{font-size:clamp(1.02rem,1.4vw,1.18rem);color:var(--fg-dim);max-width:34ch;margin-bottom:32px;line-height:1.55}

  /* ---- capture ---- */
  .capture{display:flex;gap:10px;flex-wrap:wrap;max-width:440px}
  .capture input{
    flex:1 1 220px;min-width:0;background:var(--ink-2);border:1px solid var(--line);
    color:var(--fg);font-family:"IBM Plex Sans",sans-serif;font-size:1rem;
    padding:14px 16px;border-radius:10px;transition:border-color .15s,box-shadow .15s;
  }
  .capture input::placeholder{color:#5f7178}
  .capture input:focus{outline:none;border-color:var(--go);box-shadow:0 0 0 3px rgba(55,185,138,.18)}
  .capture button{
    background:var(--go);color:#062018;border:none;font-family:"Space Grotesk",sans-serif;
    font-weight:600;font-size:1rem;padding:14px 22px;border-radius:10px;cursor:pointer;
    transition:background .15s,transform .06s;white-space:nowrap;
  }
  .capture button:hover{background:var(--go-press)}
  .capture button:active{transform:translateY(1px)}
  .capture button:disabled{opacity:.6;cursor:default}
  .offer{font-family:"IBM Plex Mono",monospace;font-size:.8rem;color:var(--fg-dim);margin-top:14px;letter-spacing:.02em}
  .offer b{color:var(--fg);font-weight:500}
  .formnote{font-size:.86rem;margin-top:12px;min-height:1.2em}
  .formnote.err{color:var(--fail)}
  .formnote.ok{color:var(--ok)}

  /* ---- the signature: instrument readout ---- */
  .readout{
    background:var(--screen);color:var(--ink-fg);border-radius:var(--radius);
    border:1px solid var(--screen-line);
    box-shadow:0 24px 60px -24px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.6);
    overflow:hidden;position:relative;
  }
  .readout .scan{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(55,185,138,.06),transparent);height:40%;transform:translateY(-120%);animation:scan 5.5s ease-in-out infinite}
  .ro-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--screen-line);font-family:"IBM Plex Mono",monospace;font-size:.74rem;letter-spacing:.04em;color:var(--ink-fg-dim)}
  .ro-head .target{color:var(--ink-fg);font-weight:500}
  .ro-head .live{display:flex;align-items:center;gap:7px;text-transform:uppercase}
  .ro-head .live .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:beat 2.4s infinite}
  .ro-body{padding:8px 0}
  .ro-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--screen-line)}
  .ro-row:last-child{border-bottom:none}
  .ro-row .ind{width:9px;height:9px;border-radius:2px;flex:none}
  .ro-row.ok .ind{background:var(--ok)}
  .ro-row.warn .ind{background:var(--warn)}
  .ro-row.fail .ind{background:var(--fail)}
  .ro-row .label{font-family:"IBM Plex Sans",sans-serif;font-size:.95rem;color:var(--ink-fg);flex:1}
  .ro-row .val{font-family:"IBM Plex Mono",monospace;font-size:.86rem;font-weight:500}
  .ro-row.ok .val{color:#1d7d5c}
  .ro-row.warn .val{color:#9a6f1c}
  .ro-row.fail .val{color:#b23f3b}
  .ro-foot{padding:13px 18px;background:#e6ebe8;font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:var(--ink-fg-dim);display:flex;justify-content:space-between;letter-spacing:.03em}
  .ro-foot .stamp{color:var(--ink-fg)}

  /* ---- what you get ---- */
  .gets{border-top:1px solid var(--line);padding:clamp(40px,6vw,72px) 0}
  .gets-label{font-family:"IBM Plex Mono",monospace;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-dim);margin-bottom:28px}
  .gets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .get{background:var(--ink);padding:26px 24px}
  .get .n{font-family:"IBM Plex Mono",monospace;font-size:.78rem;color:var(--go);margin-bottom:14px;letter-spacing:.04em}
  .get p{color:var(--fg);font-size:1rem;line-height:1.5}

  /* ---- closing capture ---- */
  .close{border-top:1px solid var(--line);padding:clamp(48px,7vw,88px) 0;text-align:center}
  .close h2{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(1.6rem,3vw,2.3rem);letter-spacing:-.02em;color:#fff;margin-bottom:16px;text-wrap:balance}
  .close .sub{margin:0 auto 30px}
  .close .capture{margin:0 auto}
  .close .formnote{text-align:center}

  /* ---- footer ---- */
  footer{border-top:1px solid var(--line);padding:30px 0}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  footer .fnote{font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:var(--fg-dim);letter-spacing:.02em;line-height:1.5}
  footer a{color:var(--fg-dim);text-decoration:underline;text-underline-offset:3px}

  /* ---- index (no ?p= given) ---- */
  .index{padding:clamp(48px,8vw,96px) 0}
  .index h1{font-size:clamp(1.8rem,3.4vw,2.6rem);margin-bottom:10px}
  .index .sub{margin-bottom:40px;max-width:52ch}
  .idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .idx-card{display:block;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:22px;text-decoration:none;color:inherit;transition:border-color .15s,transform .12s}
  .idx-card:hover{border-color:var(--go);transform:translateY(-2px)}
  .idx-card .nm{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.15rem;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:9px}
  .idx-card .nm .d{width:8px;height:8px;border-radius:50%}
  .idx-card .ln{color:var(--fg-dim);font-size:.95rem;line-height:1.45}
  .idx-card .go{font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:var(--go);margin-top:14px;letter-spacing:.04em}

  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(55,185,138,.5)}70%{box-shadow:0 0 0 7px rgba(55,185,138,0)}100%{box-shadow:0 0 0 0 rgba(55,185,138,0)}}
  @keyframes scan{0%{transform:translateY(-120%)}45%{transform:translateY(280%)}100%{transform:translateY(280%)}}

  @media (max-width:820px){
    .hero-grid{grid-template-columns:1fr;gap:36px}
    .sub{max-width:none}
    .gets-grid{grid-template-columns:1fr}
    body{font-size:16px}
  }
  @media (prefers-reduced-motion:reduce){
    .pulse,.ro-head .live .dot{animation:none}
    .scan{display:none}
    *{transition:none!important}
  }
</style>
</head>
<body>
  <div id="app"></div>

<script>
/* =====================================================================
   CONFIG — the 8 bets. Each renders the same template with its own copy
   + a live "instrument readout" of the problem it would catch.
   state: "ok" | "warn" | "fail"  (status color is information, not decor)
   ===================================================================== */
const IDEAS = {
  tenantwatch:{
    name:"TenantWatch", eyebrow:"Microsoft 365 · early access",
    h:"You're paying for Microsoft 365 seats nobody uses.",
    sub:"TenantWatch scans your Microsoft 365 tenant every week and tells you which licenses are wasted, which accounts skip MFA, and what's about to expire — all in one short email.",
    target:"tenant: acme.onmicrosoft.com",
    rows:[
      {s:"warn",l:"Unused licenses",v:"14 · $1,260/mo"},
      {s:"fail",l:"Admins without MFA",v:"2"},
      {s:"warn",l:"Security drift",v:"3 findings"},
      {s:"ok",l:"Mailbox backups",v:"healthy"},
    ],
    gets:["Dollar figure on every wasted seat","Security gaps flagged before the audit","One email a week, zero dashboards"],
  },
  labdoctor:{
    name:"LabDoctor", eyebrow:"Self-hosted · early access",
    h:"Your homelab broke. Here's exactly why.",
    sub:"LabDoctor watches the services running on your home server and, when one falls over, tells you what broke and how to fix it — not just that it's down.",
    target:"host: homelab-01",
    rows:[
      {s:"fail",l:"jellyfin",v:"OOMKilled 3× / 1h"},
      {s:"warn",l:"/tank capacity",v:"91% full"},
      {s:"ok",l:"diagnosis",v:"ready"},
      {s:"ok",l:"14 other services",v:"up"},
    ],
    gets:["The fix, in plain English","Catches the crash before the household does","Runs on the box you already have"],
  },
  deadmanscript:{
    name:"DeadManScript", eyebrow:"Automation · early access",
    h:"Your nightly script died 6 days ago. Nobody told you.",
    sub:"DeadManScript runs your PowerShell jobs on a schedule in the cloud and pings you the instant one fails — with a plain-English read on what went wrong.",
    target:"job: backup-nightly.ps1",
    rows:[
      {s:"fail",l:"Last successful run",v:"6 days ago"},
      {s:"warn",l:"Expected cadence",v:"every 24h"},
      {s:"fail",l:"Last exit code",v:"1"},
      {s:"ok",l:"AI failure summary",v:"ready"},
    ],
    gets:["A ping the instant a job fails","AI tells you why it broke","No infra to stand up"],
  },
  expiryhawk:{
    name:"ExpiryHawk", eyebrow:"Monitoring · early access",
    h:"Never get paged for an expired cert again.",
    sub:"ExpiryHawk tracks every certificate, domain, license, and API key you own, and warns you days before any of them lapse — never after.",
    target:"watching 27 assets",
    rows:[
      {s:"fail",l:"*.acme.io TLS",v:"expires 3d"},
      {s:"warn",l:"domain acme.io",v:"renews 12d"},
      {s:"ok",l:"stripe_live_key",v:"rotates 30d"},
      {s:"ok",l:"23 other assets",v:"clear"},
    ],
    gets:["Every expiry in one place","Warns you with days to spare","Certs, domains, licenses, keys, warranties"],
  },
  restorecheck:{
    name:"RestoreCheck", eyebrow:"Backups · early access",
    h:"You have backups. They might not actually restore.",
    sub:"RestoreCheck automatically test-restores your backups on a schedule and tells you whether they'd actually come back — before the day you're betting everything on them.",
    target:"repo: veeam-prod",
    rows:[
      {s:"fail",l:"Last restore test",v:"FAILED"},
      {s:"warn",l:"Sets unverified 30d+",v:"3"},
      {s:"ok",l:"Backup age",v:"2h"},
      {s:"ok",l:"Backup size",v:"nominal"},
    ],
    gets:["Proof your restore actually works","Catches silent corruption early","Sleep before the disaster, not during"],
  },
  scriptvault:{
    name:"ScriptVault", eyebrow:"PowerShell · early access",
    h:"Every PowerShell script you've written, finally findable.",
    sub:"ScriptVault indexes every PowerShell script you've got and makes them searchable by what they actually do — and flags the destructive ones before you hit enter.",
    target:"vault: \\\\scripts",
    rows:[
      {s:"ok",l:"Scripts indexed",v:"247"},
      {s:"warn",l:"Flagged irreversible",v:"9"},
      {s:"warn",l:"Undocumented",v:"12"},
      {s:"ok",l:"Search index",v:"live"},
    ],
    gets:["Search by what it does, not the filename","Auto-docs every script","Flags the ones that bite"],
  },
  runbookgen:{
    name:"RunbookGen", eyebrow:"IT docs · early access",
    h:"The runbooks you never write, written for you.",
    sub:"RunbookGen turns the tickets and changes you've already closed into audit-ready runbooks and change docs — automatically, with zero extra writing.",
    target:"source: ServiceNow",
    rows:[
      {s:"ok",l:"Changes documented",v:"14 / 14"},
      {s:"ok",l:"Audit coverage",v:"92%"},
      {s:"warn",l:"Needs review",v:"2"},
      {s:"ok",l:"Export",v:"ready"},
    ],
    gets:["Runbooks from tickets you already closed","Audit-ready, no extra effort","Stop answering 'how'd we fix this last time?'"],
  },
  kinkeeper:{
    name:"KinKeeper", eyebrow:"Family IT · early access",
    h:"Be the family IT hero without the house calls.",
    sub:"KinKeeper quietly monitors your family's PCs and gives you a heads-up — failing drive, pending updates, dead antivirus — before it becomes a panicked phone call.",
    target:"device: Dad's PC",
    rows:[
      {s:"fail",l:"Drive health (SMART)",v:"failing"},
      {s:"warn",l:"Updates pending",v:"47"},
      {s:"ok",l:"Last seen",v:"8m ago"},
      {s:"ok",l:"Antivirus",v:"active"},
    ],
    gets:["Catch the failing drive before they do","No more mystery 'it's doing the thing' calls","Fix it before the drive over"],
  },
};

/* ---- Supabase capture (fill these in; see DEPLOY.md) ---- */
const SUPABASE_URL = "https://vgwpvjiuqdadycwnjcla.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnd3B2aml1cWRhZHljd25qY2xhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MDcyMDIsImV4cCI6MjA5ODE4MzIwMn0.zuSwBGROU--kdl2xSwGBPmUilnI_E48FJywZBhAmUfA";

async function logEvent(slug, type, email){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) { console.warn("[smoke] Supabase not configured — event not stored:", {slug,type,email}); return; }
  try{
    await fetch(SUPABASE_URL + "/rest/v1/smoke_events", {
      method:"POST",
      headers:{
        "apikey":SUPABASE_ANON_KEY,
        "Authorization":"Bearer "+SUPABASE_ANON_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({ page:slug, event:type, email:email||null, meta:{ referrer:document.referrer||null } })
    });
  }catch(e){ console.warn("[smoke] event failed", e); }
}

const STATE_COLOR = {ok:"var(--ok)",warn:"var(--warn)",fail:"var(--fail)"};
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function captureBlock(slug){
  return `
    <div class="capture" data-capture>
      <input type="email" placeholder="you@work.com" aria-label="Email address" autocomplete="email" />
      <button type="button">Get early access</button>
    </div>
    <div class="offer"><b>$5/mo</b> at launch — free for early-access members.</div>
    <div class="formnote" role="status" aria-live="polite"></div>`;
}

function renderIdea(slug){
  const d = IDEAS[slug];
  document.title = d.name + " — early access";
  const rows = d.rows.map(r=>`
    <div class="ro-row ${r.s}"><span class="ind"></span><span class="label">${esc(r.l)}</span><span class="val">${esc(r.v)}</span></div>`).join("");
  const gets = d.gets.map((g,i)=>`
    <div class="get"><div class="n">0${i+1}</div><p>${esc(g)}</p></div>`).join("");

  document.getElementById("app").innerHTML = `
  <header class="topbar"><div class="wrap">
    <div class="mark"><span class="pulse"></span>${esc(d.name)}</div>
    <div class="meta">now watching</div>
  </div></header>

  <main>
    <section class="hero"><div class="wrap"><div class="hero-grid">
      <div class="hero-copy">
        <div class="eyebrow">${esc(d.eyebrow)}</div>
        <h1>${esc(d.h)}</h1>
        <p class="sub">${esc(d.sub)}</p>
        ${captureBlock(slug)}
      </div>
      <div class="readout" aria-hidden="true">
        <div class="scan"></div>
        <div class="ro-head"><span class="target">${esc(d.target)}</span><span class="live"><span class="dot"></span>live</span></div>
        <div class="ro-body">${rows}</div>
        <div class="ro-foot"><span>scan complete</span><span class="stamp" data-stamp>last checked 0s ago</span></div>
      </div>
    </div></div></section>

    <section class="gets"><div class="wrap">
      <div class="gets-label">What you get</div>
      <div class="gets-grid">${gets}</div>
    </div></section>

    <section class="close"><div class="wrap" style="max-width:620px">
      <h2>Want in before everyone else?</h2>
      <p class="sub">Early-access members get ${esc(d.name)} free, lock the $5/mo founding price, and shape what ships.</p>
      ${captureBlock(slug)}
    </div></section>
  </main>

  <footer><div class="wrap">
    <div class="fnote">${esc(d.name)} · early-access waitlist. We'll email you when it opens — nothing else.</div>
    <div class="fnote"><a href="?">see all ${Object.keys(IDEAS).length} tools</a></div>
  </div></footer>`;

  wireCaptures(slug);
  tickStamp();
  logEvent(slug,"view");
}

function wireCaptures(slug){
  document.querySelectorAll("[data-capture]").forEach(block=>{
    const input = block.querySelector("input");
    const btn = block.querySelector("button");
    const note = block.parentElement.querySelector(".formnote");
    const submit = async ()=>{
      const email = (input.value||"").trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
        note.className="formnote err"; note.textContent="That email doesn't look right — check it and try again.";
        input.focus(); return;
      }
      btn.disabled=true; const orig=btn.textContent; btn.textContent="Saving…";
      await logEvent(slug,"signup",email);
      note.className="formnote ok"; note.textContent="You're on the list. We'll email you the moment "+IDEAS[slug].name+" opens.";
      input.value=""; btn.textContent="On the list ✓";
      setTimeout(()=>{btn.textContent=orig; btn.disabled=false;},2500);
    };
    btn.addEventListener("click",submit);
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
  });
}

let t0=Date.now();
function tickStamp(){
  const els=[...document.querySelectorAll("[data-stamp]")];
  if(!els.length) return;
  const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  const upd=()=>{ const s=Math.floor((Date.now()-t0)/1000); els.forEach(e=>e.textContent=`last checked ${s}s ago`); };
  upd(); if(!reduce) setInterval(upd,1000);
}

function renderIndex(){
  document.title = "Early access — 8 tools";
  const cards = Object.entries(IDEAS).map(([slug,d])=>{
    const worst = d.rows.some(r=>r.s==="fail")?"fail":d.rows.some(r=>r.s==="warn")?"warn":"ok";
    return `<a class="idx-card" href="?p=${slug}">
      <div class="nm"><span class="d" style="background:${STATE_COLOR[worst]}"></span>${esc(d.name)}</div>
      <div class="ln">${esc(d.sub)}</div>
      <div class="go">open →</div>
    </a>`;
  }).join("");
  document.getElementById("app").innerHTML = `
  <header class="topbar"><div class="wrap">
    <div class="mark"><span class="pulse"></span>Early Access</div>
    <div class="meta">${Object.keys(IDEAS).length} tools · pick one</div>
  </div></header>
  <main class="index"><div class="wrap">
    <h1>Eight tools that watch so you don't have to.</h1>
    <p class="sub">Each one keeps an eye on something that breaks at the worst possible time. Open any to see what it catches — and grab early access.</p>
    <div class="idx-grid">${cards}</div>
  </div></main>
  <footer><div class="wrap"><div class="fnote">Early-access waitlists. One email when a tool opens — nothing else.</div></div></footer>`;
}

(function(){
  const slug = new URLSearchParams(location.search).get("p");
  if(slug && IDEAS[slug]) renderIdea(slug);
  else renderIndex();
})();
</script>
</body>
</html>
